<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="./src/css/style.css" />
  </head>
  <body>
    <section class="task-1">
      <form>
        <p>Choose a color:</p>
        <label>
          <input type="radio" name="color" value="red" checked />
          Red
        </label>
        <label>
          <input type="radio" name="color" value="white" />
          White
        </label>
        <label>
          <input type="radio" name="color" value="green" />
          Green
        </label>
      </form>
    </section>

    <section class="task-2">
      <input type="text" placeholder="Ваше ім'я?" id="name-input" />
      <h1>Привіт, <span id="name-output">незнайомець</span>!</h1>
    </section>

    <section class="task-3">
      <input
        type="text"
        id="validation-input"
        data-length="6"
        placeholder="Введи 6 символів"
      />
    </section>

    <section class="task-4">
      <input min="0" max="100" id="font-size-control" type="range" />
      <br />
      <span id="text">Абракадабра!</span>
    </section>
    <script type="module" src="./src/js/index.js"></script>
  </body>
</html>
